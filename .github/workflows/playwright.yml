name: Playwright-API-Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      run:
        description: 'Testomat run ID'
        required: false
      grep:
        description: 'Testomat test IDs to run'
        required: false

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    name: Run API tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        env:
          TESTOMATIO: ${{ secrets.TESTOMATIO_API_KEY }}
          TESTOMATIO_TITLE: "Run ${{ github.run_number }} - ${{ github.ref_name }}"
          TESTOMATIO_RUN: ${{ github.event.inputs.run }}
        run: npm test -- ${{ github.event.inputs.grep && format('--grep "{0}"', github.event.inputs.grep) || '' }}

      - name: Upload HTML report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload Pages artifact
        if: always() && github.ref == 'refs/heads/master'
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-report/

  deploy-report:
    name: Publish report to GitHub Pages
    needs: test
    if: always() && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
